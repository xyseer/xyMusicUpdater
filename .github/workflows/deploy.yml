name: Deploy

# Publish multi-arch image to Docker Hub.
# Triggers ONLY on version tags (v*.*.*). Normal branch pushes / PRs never
# reach this workflow — they only run CI.
on:
  push:
    tags: ['V*.*.*']

jobs:
  # 1) Re-run the full CI suite (reusable workflow) against the tagged commit.
  #    This is the hard gate: the publish job below cannot start unless every
  #    CI job here succeeds.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # 2) Build + push multi-arch image. Runs only after `ci` passes.
  docker-publish:
    name: Publish to Docker Hub
    needs: ci
    runs-on: ubuntu-latest
    # Environment-scoped secrets. Set "Deployment branch and tag rules" on this
    # environment to `v*.*.*` so DOCKERHUB_* are only ever exposed to tag runs.
    # Rename to match the Environment you created in repo Settings → Environments.
    environment: dockerhub
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: xyseer/xymusicupdater
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
