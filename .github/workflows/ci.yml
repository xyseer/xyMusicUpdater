name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow other workflows (deploy.yml) to reuse these jobs as a gate.
  workflow_call:

jobs:
  # ── Backend — pytest ────────────────────────────────────────────────────────
  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ci-only-secret-not-for-production
          DB_PATH: /tmp/ci_test.sqlite3
          TEMP_FOLDER: /tmp/ci_music_temp
          PERMANENT_SAVING_DIR: /tmp/ci_music_perm
          APP_USER: admin
          APP_PASSWORD: testpass
        run: pytest -v --tb=short -q

  # ── Frontend — vitest + build ───────────────────────────────────────────────
  frontend-test:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm test

      - name: Build (verify production bundle)
        working-directory: frontend
        run: npm run build

  # ── Docker — build-only verification (no push, no secrets) ──────────────────
  docker-build:
    name: Docker build (verify only)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: xymusicupdater:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
